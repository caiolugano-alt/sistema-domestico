<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Doméstico</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Controle Doméstico</h1>

<p id="versaoSistema"></p>

<button onclick="sairSistema()" class="btn-sair">Sair</button>

<div class="dashboard">

<div class="card">
<h3>Total em Estoque</h3>
<p id="totalEstoque">R$ 0</p>
</div>

<div class="card">
<h3>Total Gastos</h3>
<p id="totalGastos">R$ 0</p>
</div>

<div class="card">
<h3>Produtos</h3>
<p id="totalProdutos">0</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Quantidade</th>
<th>Preço</th>
<th>Situação</th>
<th>Alerta IA</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaProdutos">

</tbody>

</table>

<br>

<button onclick="abrirAdicionar()">Adicionar Produto</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<script src="config.js"></script>
<script src="database.js"></script>
<script src="script.js"></script>

</body>
</html>
