<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Sistema Doméstico</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Controle Doméstico</h1>

<div id="infoSistema"></div>

<div class="dashboard">

<div class="card">
<h3>Total em Estoque</h3>
<p id="totalEstoque">0</p>
</div>

<div class="card">
<h3>Total Gastos</h3>
<p id="totalGastos">0</p>
</div>

<div class="card">
<h3>Produtos</h3>
<p id="totalProdutos">0</p>
</div>

</div>

<table>

<thead>

<tr>

<th>Produto</th>
<th>Quantidade</th>
<th>Preço</th>
<th>Situação</th>
<th>Alerta IA</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="listaProdutos"></tbody>

</table>

<button onclick="adicionarProduto()">Adicionar Produto</button>

<button onclick="exportarExcel()">Exportar Excel</button>

<script src="config.js"></script>
<script src="app.js"></script>

</body>

</html>
